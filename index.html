<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2e3440" />
    <link rel="icon" href="./assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./assets/android-chrome-512x512.png" />
    <title>ZELLIS Arcade</title>
    <style>
      :root {
        --nord0: #2e3440;
        --nord1: #3b4252;
        --nord2: #434c5e;
        --nord3: #4c566a;
        --nord4: #d8dee9;
        --nord5: #e5e9f0;
        --nord6: #eceff4;
        --frost0: #8fbcbb;
        --frost1: #88c0d0;
        --frost2: #81a1c1;
        --frost3: #5e81ac;
        --aurora0: #bf616a;
        --aurora1: #d08770;
        --aurora2: #ebcb8b;
        --aurora3: #a3be8c;
      }

      :root, [data-theme="light"] {
        color-scheme: light;
        --bg-page: linear-gradient(180deg, #f8fafc 0%, var(--nord6) 56%, #dde6f0 100%);
        --bg-accent-blob: rgba(129, 161, 193, 0.22);
        --bg-card: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(236,239,244,0.94));
        --card-border: rgba(94, 129, 172, 0.1);
        --card-hover-border: rgba(129, 161, 193, 0.42);
        --shadow-card: 0 18px 40px rgba(46, 52, 64, 0.12);
        --shadow-card-rest: 0 8px 18px rgba(46, 52, 64, 0.06);
        --text: var(--nord0);
        --text-muted: var(--nord3);
        --accent: var(--frost2);
        --accent-strong: var(--frost3);
        --accent-rgb: 129, 161, 193;
        --blob1: rgba(143, 188, 187, 0.2);
        --blob2: rgba(129, 161, 193, 0.16);
        --toggle-bg: rgba(46, 52, 64, 0.08);
        --toggle-hover: rgba(46, 52, 64, 0.14);
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg-page: linear-gradient(180deg, #1e222a 0%, var(--nord0) 56%, #252b35 100%);
        --bg-accent-blob: rgba(129, 161, 193, 0.08);
        --bg-card: linear-gradient(135deg, rgba(59,66,82,0.94), rgba(46,52,64,0.96));
        --card-border: rgba(129, 161, 193, 0.08);
        --card-hover-border: rgba(129, 161, 193, 0.32);
        --shadow-card: 0 18px 40px rgba(0, 0, 0, 0.3);
        --shadow-card-rest: 0 8px 18px rgba(0, 0, 0, 0.15);
        --text: var(--nord5);
        --text-muted: var(--nord4);
        --accent: var(--frost1);
        --accent-strong: var(--frost2);
        --accent-rgb: 136, 192, 208;
        --blob1: rgba(143, 188, 187, 0.06);
        --blob2: rgba(129, 161, 193, 0.05);
        --toggle-bg: rgba(236, 239, 244, 0.08);
        --toggle-hover: rgba(236, 239, 244, 0.16);
      }

      * { box-sizing: border-box; }

      html {
        min-height: 100%;
        background:
          radial-gradient(circle at top, var(--bg-accent-blob), transparent 38%),
          var(--bg-page);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: transparent;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
        filter: blur(8px);
      }

      body::before {
        top: 5rem;
        left: -4rem;
        width: 18rem;
        height: 18rem;
        border-radius: 50%;
        background: var(--blob1);
      }

      body::after {
        right: -3rem;
        bottom: 4rem;
        width: 20rem;
        height: 20rem;
        border-radius: 38% 62% 53% 47%;
        background: var(--blob2);
      }

      .page {
        position: relative;
        z-index: 1;
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }

      .hero {
        padding: clamp(1rem, 3vw, 2rem) 0 1.5rem;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 0.6rem;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 5rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.2rem;
        margin-top: 1.5rem;
      }

      .card {
        display: block;
        padding: 1.25rem;
        border: 1px solid var(--card-border);
        border-radius: 1.3rem;
        background: var(--bg-card);
        box-shadow: var(--shadow-card-rest);
        text-decoration: none;
        color: inherit;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-2px);
        border-color: var(--card-hover-border);
        box-shadow: var(--shadow-card);
        outline: none;
      }

      .card-title {
        margin: 0;
        font-size: 1.12rem;
        font-weight: 760;
        letter-spacing: -0.03em;
      }

      .card-desc {
        margin: 0.4rem 0 0;
        font-size: 0.92rem;
        line-height: 1.45;
        color: var(--text-muted);
      }

      .card-icon {
        width: 40px;
        height: 40px;
        border-radius: 0.5rem;
        margin-bottom: 0.5rem;
        object-fit: contain;
      }

      .card-status {
        display: inline-block;
        padding: 0.25rem 0.6rem;
        background: var(--accent-strong);
        color: #fff;
        border-radius: 0.35rem;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .card-status.prototype {
        background: #e07a2f;
      }

      .footer-copy {
        margin: 2rem 0 0;
        font-size: 0.94rem;
        color: var(--text-muted);
        text-align: center;
      }

      .empty-state {
        grid-column: 1 / -1;
        padding: 2rem;
        text-align: center;
        border: 1px dashed var(--card-border);
        border-radius: 1.3rem;
        color: var(--text-muted);
      }

      .noscript {
        margin-top: 1rem;
        padding: 1rem 1.1rem;
        border-radius: 1rem;
        background: rgba(191, 97, 106, 0.1);
        color: var(--text);
        text-align: center;
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 100;
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 50%;
        background: var(--toggle-bg);
        backdrop-filter: blur(8px);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 180ms ease;
      }

      .theme-toggle:hover {
        background: var(--toggle-hover);
      }

      .theme-toggle svg {
        width: 22px;
        height: 22px;
        fill: var(--text);
        transition: fill 180ms ease;
      }

      .theme-toggle .icon-sun { display: none; }
      .theme-toggle .icon-moon { display: block; }
      [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
      [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

      @media (max-width: 860px) {
        .page { width: min(100% - 1.2rem, 1120px); padding-top: 1.2rem; }
        .grid { grid-template-columns: 1fr; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; }
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8A9.06 9.06 0 0 0 12 3z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 18a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zm9-9a1 1 0 0 1 0 2h-1a1 1 0 1 1 0-2h1zM4 11a1 1 0 0 1 0 2H3a1 1 0 1 1 0-2h1zm14.36-5.95a1 1 0 0 1 0 1.41l-.7.71a1 1 0 0 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zM7.76 16.24a1 1 0 0 1 0 1.41l-.7.71a1 1 0 0 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zm10.48 0a1 1 0 0 1 1.42 1.41l-.71.71a1 1 0 0 1-1.41-1.42l.7-.7zM7.76 7.76a1 1 0 0 1-1.41 0l-.71-.7a1 1 0 0 1 1.41-1.42l.71.7a1 1 0 0 1 0 1.42z"/></svg>
    </button>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">zellis games</p>
        <h1>Pick a game.</h1>
      </header>

      <div id="grid" class="grid"></div>

      <p class="footer-copy"></p>

      <noscript>
        <div class="noscript">
          <a href="./tic_tac_toe/index.html">Tic Tac Toe</a> ·
          <a href="./flappy/index.html">Flappy</a> ·
          <a href="./pai-do/index.html">pai-do</a>
        </div>
      </noscript>
    </main>

    <script>
      (function() {
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;
        const KEY = 'zellis-theme';

        function getSystemTheme() {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function apply(theme) {
          root.setAttribute('data-theme', theme);
        }

        const saved = localStorage.getItem(KEY);
        apply(saved || getSystemTheme());

        toggle.addEventListener('click', () => {
          const current = root.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          apply(next);
          localStorage.setItem(KEY, next);
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem(KEY)) {
            apply(e.matches ? 'dark' : 'light');
          }
        });
      })();

      const fallbackGames = [
        { id: "tic_tac_toe", title: "Tic Tac Toe", description: "Classic 3x3 play with a portrait-first layout built for the browser.", url: "./tic_tac_toe/index.html", status: "Ready", icon: "./tic_tac_toe/Tic Tac Toe.icon.png", accent: "#81a1c1" },
        { id: "flappy", title: "Flappy", description: "Tap or click to flap, hold altitude, and reset instantly for another run.", url: "./flappy/index.html", status: "Prototype", icon: "./flappy/Flappy.icon.png", accent: "#d08770" },
        { id: "pai_do", title: "pai-do", description: "Prototype board sandbox with a portrait-first playfield and a slide-up tile drawer.", url: "./pai-do/index.html", status: "Prototype", icon: "./pai-do/index.icon.png", accent: "#b48766" },
      ];
      const grid = document.getElementById("grid");
      const footer = document.querySelector(".footer-copy");

      function render(games) {
        grid.innerHTML = "";
        if (!games.length) {
          grid.innerHTML = '<div class="empty-state">No games registered. Add entries to <code>data/games.json</code>.</div>';
          return;
        }

        games.forEach((game) => {
          const a = document.createElement("a");
          a.href = game.url;
          a.className = "card";
          a.innerHTML = `
            <img class="card-icon" src="${game.icon}" alt="">
            <p class="card-title">${game.title}</p>
            <p class="card-desc">${game.description}</p>
            <span class="card-status${game.status === 'Prototype' ? ' prototype' : ''}">${game.status}</span>`;
          grid.appendChild(a);
        });

        footer.textContent = `${games.length} game${games.length === 1 ? "" : "s"} · built with Godot`;
      }

      async function load() {
        try {
          const res = await fetch("./data/games.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          render(Array.isArray(data) ? data : []);
        } catch {
          render(fallbackGames);
        }
      }

      load();
    </script>
  </body>
</html>
