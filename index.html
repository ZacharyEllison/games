<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2e3440" />
    <link rel="icon" href="./assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./assets/android-chrome-512x512.png" />
    <title>ZELLIS Arcade</title>
    <style>
      :root {
        color-scheme: light;
        --nord0: #2e3440;
        --nord1: #3b4252;
        --nord2: #434c5e;
        --nord3: #4c566a;
        --nord4: #d8dee9;
        --nord5: #e5e9f0;
        --nord6: #eceff4;
        --frost0: #8fbcbb;
        --frost1: #88c0d0;
        --frost2: #81a1c1;
        --frost3: #5e81ac;
        --aurora0: #bf616a;
        --aurora1: #d08770;
        --aurora2: #ebcb8b;
        --aurora3: #a3be8c;
        --accent: var(--frost2);
        --accent-strong: var(--frost3);
        --accent-rgb: 129, 161, 193;
        --shadow-card: 0 18px 40px rgba(46, 52, 64, 0.12);
      }

      * { box-sizing: border-box; }

      html {
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(var(--accent-rgb), 0.22), transparent 38%),
          linear-gradient(180deg, #f8fafc 0%, var(--nord6) 56%, #dde6f0 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--nord0);
        background: transparent;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
        filter: blur(8px);
      }

      body::before {
        top: 5rem;
        left: -4rem;
        width: 18rem;
        height: 18rem;
        border-radius: 50%;
        background: rgba(143, 188, 187, 0.2);
      }

      body::after {
        right: -3rem;
        bottom: 4rem;
        width: 20rem;
        height: 20rem;
        border-radius: 38% 62% 53% 47%;
        background: rgba(var(--accent-rgb), 0.16);
      }

      .page {
        position: relative;
        z-index: 1;
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }

      .hero {
        padding: clamp(1rem, 3vw, 2rem) 0 1.5rem;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 0.6rem;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 5rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      .lede {
        max-width: 42rem;
        margin: 1rem auto 0;
        font-size: clamp(1rem, 2.2vw, 1.15rem);
        line-height: 1.6;
        color: var(--nord3);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.2rem;
        margin-top: 1.5rem;
      }

      .card {
        display: block;
        padding: 1.25rem;
        border: 1px solid rgba(94, 129, 172, 0.1);
        border-radius: 1.3rem;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(236, 239, 244, 0.94)),
          radial-gradient(circle at top right, rgba(var(--accent-rgb), 0.1), transparent 50%);
        box-shadow: 0 8px 18px rgba(46, 52, 64, 0.06);
        text-decoration: none;
        color: inherit;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(var(--accent-rgb), 0.42);
        box-shadow: var(--shadow-card);
        outline: none;
      }

      .card-title {
        margin: 0;
        font-size: 1.12rem;
        font-weight: 760;
        letter-spacing: -0.03em;
      }

      .card-desc {
        margin: 0.4rem 0 0;
        font-size: 0.92rem;
        line-height: 1.45;
        color: var(--nord3);
      }

      .card-icon {
        width: 40px;
        height: 40px;
        border-radius: 0.5rem;
        margin-bottom: 0.5rem;
        object-fit: contain;
      }

      .card-status {
        display: inline-block;
        margin-top: 0.85rem;
        font-size: 0.73rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      .footer-copy {
        margin: 2rem 0 0;
        font-size: 0.94rem;
        color: var(--nord3);
        text-align: center;
      }

      .empty-state {
        grid-column: 1 / -1;
        padding: 2rem;
        text-align: center;
        border: 1px dashed rgba(94, 129, 172, 0.2);
        border-radius: 1.3rem;
        color: var(--nord3);
      }

      .noscript {
        margin-top: 1rem;
        padding: 1rem 1.1rem;
        border-radius: 1rem;
        background: rgba(191, 97, 106, 0.1);
        color: var(--nord1);
        text-align: center;
      }

      @media (max-width: 860px) {
        .page { width: min(100% - 1.2rem, 1120px); padding-top: 1.2rem; }
        .grid { grid-template-columns: 1fr; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">zellis games</p>
        <h1>Pick a game.</h1>
        <p class="lede">web-exported versions of the Godot projects, code assisted with a local agent</p>
      </header>

      <div id="grid" class="grid"></div>

      <p class="footer-copy"></p>

      <noscript>
        <div class="noscript">
          <a href="./tic_tac_toe/index.html">Tic Tac Toe</a> ·
          <a href="./flappy/index.html">Flappy</a> ·
          <a href="./pai-do/index.html">pai-do</a>
        </div>
      </noscript>
    </main>

    <script>
      const fallbackGames = [
        { id: "tic_tac_toe", title: "Tic Tac Toe", description: "Classic 3x3 play with a portrait-first layout built for the browser.", url: "./tic_tac_toe/index.html", status: "Ready", icon: "./tic_tac_toe/Tic Tac Toe.icon.png", accent: "#81a1c1" },
        { id: "flappy", title: "Flappy", description: "Tap or click to flap, hold altitude, and reset instantly for another run.", url: "./flappy/index.html", status: "Prototype", icon: "./flappy/Flappy.icon.png", accent: "#d08770" },
        { id: "pai_do", title: "pai-do", description: "Prototype board sandbox with a portrait-first playfield and a slide-up tile drawer.", url: "./pai-do/index.html", status: "Prototype", icon: "./pai-do/index.icon.png", accent: "#b48766" },
      ];
      const grid = document.getElementById("grid");
      const footer = document.querySelector(".footer-copy");

      function toRgb(hex) {
        const v = String(hex || "").trim().replace(/^#/, "");
        if (!/^[0-9a-fA-F]{6}$/.test(v)) return "129, 161, 193";
        return `${Number.parseInt(v.slice(0, 2), 16)}, ${Number.parseInt(v.slice(2, 4), 16)}, ${Number.parseInt(v.slice(4, 6), 16)}`;
      }

      function render(games) {
        grid.innerHTML = "";
        if (!games.length) {
          grid.innerHTML = '<div class="empty-state">No games registered. Add entries to <code>data/games.json</code>.</div>';
          return;
        }

        games.forEach((game) => {
          const a = document.createElement("a");
          a.href = game.url;
          a.className = "card";
          a.innerHTML = `
            <img class="card-icon" src="${game.icon}" alt="">
            <p class="card-title">${game.title}</p>
            <p class="card-desc">${game.description}</p>
            <span class="card-status">${game.status}</span>`;
          grid.appendChild(a);
        });

        footer.textContent = `${games.length} game${games.length === 1 ? "" : "s"} · built with Godot`;
      }

      async function load() {
        try {
          const res = await fetch("./data/games.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          render(Array.isArray(data) ? data : []);
        } catch {
          render(fallbackGames);
        }
      }

      load();
    </script>
  </body>
</html>
