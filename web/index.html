<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>ZELLIS Arcade</title>
		<link rel="stylesheet" href="./styles.css">
	</head>
	<body>
		<div class="shell">
			<header class="hero">
				<p class="eyebrow">Web Arcade</p>
				<h1>ZELLIS Games</h1>
				<p class="subtitle">Choose a project, load it in the browser, and switch between games without leaving the launcher.</p>
			</header>

			<main class="layout">
				<section class="picker" aria-labelledby="games-heading">
					<div class="section-head">
						<h2 id="games-heading">Available Games</h2>
						<a id="open-link" class="ghost-link" href="../tic_tac_toe/index.html" target="_blank" rel="noreferrer">Open standalone</a>
					</div>
					<div id="game-list" class="game-list" role="listbox" aria-label="Choose a game"></div>
				</section>

				<section class="viewer" aria-labelledby="player-heading">
					<div class="section-head">
						<div>
							<p class="viewer-label">Now Playing</p>
							<h2 id="player-heading">Tic Tac Toe</h2>
						</div>
						<p id="viewer-copy" class="viewer-copy">Classic 3x3 play with a phone-first portrait layout.</p>
					</div>

					<div id="frame-shell" class="frame-shell" style="--game-aspect: 9 / 16;">
						<iframe
							id="game-frame"
							title="Tic Tac Toe"
							src="../tic_tac_toe/index.html"
							allow="autoplay; fullscreen"
							loading="eager"
						></iframe>
					</div>
				</section>
			</main>
		</div>

		<script src="./app.js"></script>
	</body>
</html>
